asyncapi: 3.0.0
info:
  title: Sample AsyncAPI
  version: 1.0.0
channels:
  testChannel:
    address: events.default
    messages:
      TestMessage:
        name: TestMessage
        payload:
          type: object
          properties:
            id:
              type: string
          required:
            - id
operations:
  sendOperation:
    action: send
    channel:
      $ref: '#/channels/testChannel'
    messages:
      - $ref: '#/channels/testChannel/messages/TestMessage'

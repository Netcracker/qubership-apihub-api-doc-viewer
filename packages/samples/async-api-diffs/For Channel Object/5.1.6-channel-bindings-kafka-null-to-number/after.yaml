asyncapi: 3.0.0
info:
  title: Sample AsyncAPI
  version: 1.0.0
channels:
  testChannel:
    address: events.default
    messages:
      TestMessage:
        $ref: '#/components/messages/TestMessage'
    bindings:
      kafka:
        bindingVersion: 1.0.0
        stringValue: hello
        numberValue: 7
        booleanValue: true
        nullValue: 5
        objectValue:
          first: one
          second: 2
        arrayPrimitives:
          - x
          - 1
          - false
        arrayObjects:
          - id: 1
          - id: 2
        arrayArrayPrimitives:
          - - a
            - b
          - - 1
            - 2
          - - true
            - false
operations:
  sendOperation:
    action: send
    channel:
      $ref: '#/channels/testChannel'
    messages:
      - $ref: '#/components/messages/TestMessage'
components:
  messages:
    TestMessage:
      name: TestMessage
      payload:
        type: object
        properties:
          id:
            type: string
        required:
          - id
